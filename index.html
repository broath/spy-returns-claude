<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPY Monthly Returns</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #080c14;
    --bg-surface: #0e1420;
    --bg-hover:   #131c2e;
    --border:     #1e2d44;
    --gold:       #e8b84b;
    --gold-dim:   #6b4f1c;
    --green:      #3dd68c;
    --red:        #ff4560;
    --text:       #c8cdd8;
    --text-dim:   #4a5568;
    --text-bright:#eef0f5;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
  }

  /* Scanlines */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent 0px,
      transparent 2px,
      rgba(0,0,0,0.04) 2px,
      rgba(0,0,0,0.04) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  .container {
    max-width: 920px;
    margin: 0 auto;
    padding: 28px 28px 72px;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: baseline;
    gap: 24px;
    margin-bottom: 20px;
  }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.35em;
    color: var(--gold);
    text-transform: uppercase;
    opacity: 0;
    animation: fadeIn 0.5s ease 0.05s forwards;
  }

  .title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(28px, 4vw, 42px);
    font-weight: 300;
    line-height: 1;
    letter-spacing: -0.02em;
    color: var(--text-bright);
    opacity: 0;
    animation: fadeUp 0.6s ease 0.1s forwards;
    white-space: nowrap;
  }

  .title em {
    font-style: italic;
    color: var(--gold);
  }

  .title .rule { display: none; }

  .meta {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-left: auto;
    opacity: 0;
    animation: fadeIn 0.5s ease 0.3s forwards;
  }

  /* ── Stats bar ── */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeIn 0.5s ease 0.4s forwards;
  }

  .stat {
    background: var(--bg-surface);
    padding: 12px 20px;
  }

  .stat-label {
    font-size: 9px;
    letter-spacing: 0.28em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .stat-value {
    font-size: 24px;
    font-weight: 400;
    line-height: 1;
    letter-spacing: -0.02em;
    color: var(--text-bright);
  }

  .stat-sub {
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    margin-top: 5px;
  }

  .stat-value.up   { color: var(--green); }
  .stat-value.down { color: var(--red); }
  .stat-value.gold { color: var(--gold); }

  /* ── Table ── */
  .table-wrapper {
    border: 1px solid var(--border);
    overflow: hidden;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead {
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border);
  }

  th {
    font-size: 9px;
    font-weight: 400;
    letter-spacing: 0.28em;
    color: var(--text-dim);
    text-transform: uppercase;
    padding: 13px 20px;
    text-align: left;
  }

  th.r { text-align: right; }

  tbody tr {
    border-bottom: 1px solid rgba(30,45,68,0.6);
    opacity: 0;
    animation: fadeIn 0.35s ease forwards;
    transition: background 0.12s ease;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--bg-hover); }

  td {
    padding: 10px 20px;
    font-size: 12px;
  }

  .td-month {
    color: var(--text-dim);
    font-size: 10.5px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .td-close {
    text-align: right;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }

  .td-return {
    text-align: right;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    min-width: 82px;
  }

  .td-return.up      { color: var(--green); }
  .td-return.down    { color: var(--red); }
  .td-return.neutral { color: var(--text-dim); }

  /* Inline bar */
  .td-bar { width: 160px; }

  .bar-track {
    position: relative;
    height: 2px;
    background: rgba(255,255,255,0.04);
  }

  .bar-mid {
    position: absolute;
    left: 50%;
    top: -4px;
    width: 1px;
    height: 10px;
    background: var(--border);
  }

  .bar-fill {
    position: absolute;
    top: 0;
    height: 100%;
    width: 0;
    transition: width 0.9s cubic-bezier(.16,1,.3,1);
  }

  .bar-fill.up   { left: 50%; background: var(--green); box-shadow: 0 0 5px var(--green); }
  .bar-fill.down { right: 50%; background: var(--red);   box-shadow: 0 0 5px var(--red); }

  /* Footer */
  .footer {
    margin-top: 20px;
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    opacity: 0;
    animation: fadeIn 0.5s ease 1s forwards;
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .td-bar, thead th:last-child { display: none; }
  }
</style>
</head>
<body>
<div class="container">

  <header class="header">
    <h1 class="title">SPY &mdash; <em>Monthly Returns</em></h1>
    <div class="eyebrow">SPDR S&amp;P 500 · NYSE Arca</div>
    <div class="meta" id="date-range">Loading…</div>
  </header>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">5yr Total Return</div>
      <div class="stat-value gold" id="s-total">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Best Month</div>
      <div class="stat-value up" id="s-best">—</div>
      <div class="stat-sub" id="s-best-month"></div>
    </div>
    <div class="stat">
      <div class="stat-label">Worst Month</div>
      <div class="stat-value down" id="s-worst">—</div>
      <div class="stat-sub" id="s-worst-month"></div>
    </div>
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Month</th>
          <th class="r">Close</th>
          <th class="r">Return</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="footer">
    <span>Source · Yahoo Finance — query1.finance.yahoo.com/v8/finance/chart/SPY</span>
    <span id="as-of">—</span>
  </div>
</div>

<script>
function fmtMonth(s) {
  const d = new Date(s + '-02T00:00:00Z');
  return d.toLocaleDateString('en-US', { month: 'short', year: 'numeric', timeZone: 'UTC' }).toUpperCase();
}

function fmtRet(r) {
  if (r === null || r === undefined) return '—';
  return (r >= 0 ? '+' : '') + r.toFixed(2) + '%';
}

async function render() {
  let rows;
  try {
    const res = await fetch('data.json');
    if (!res.ok) throw new Error(res.status);
    rows = await res.json();
  } catch (e) {
    document.getElementById('date-range').textContent = 'Error loading data.json — run: go run main.go';
    return;
  }

  const rets = rows.filter(r => r.return != null).map(r => r.return);
  const total = (rows[0].close - rows.at(-1).close) / rows.at(-1).close * 100;
  const best  = Math.max(...rets);
  const worst = Math.min(...rets);
  const bestRow  = rows.find(r => r.return === best);
  const worstRow = rows.find(r => r.return === worst);
  const maxAbs = Math.max(Math.abs(best), Math.abs(worst));

  document.getElementById('s-total').textContent   = (total >= 0 ? '+' : '') + total.toFixed(1) + '%';
  document.getElementById('s-best').textContent    = '+' + best.toFixed(2) + '%';
  document.getElementById('s-best-month').textContent  = bestRow ? fmtMonth(bestRow.month) : '';
  document.getElementById('s-worst').textContent   = worst.toFixed(2) + '%';
  document.getElementById('s-worst-month').textContent = worstRow ? fmtMonth(worstRow.month) : '';
  document.getElementById('date-range').textContent =
    `${fmtMonth(rows.at(-1).month)} — ${fmtMonth(rows[0].month)} · 5-Year Monthly`;
  document.getElementById('as-of').textContent =
    `Last close · $${rows.at(-1).close.toFixed(2)}`;

  const tbody = document.getElementById('tbody');
  rows.forEach((row, i) => {
    const tr = document.createElement('tr');
    tr.style.animationDelay = `${0.3 + i * 0.018}s`;

    const dir = row.return == null ? 'neutral' : row.return >= 0 ? 'up' : 'down';
    const barPct = row.return != null ? (Math.abs(row.return) / maxAbs * 50).toFixed(1) : 0;

    tr.innerHTML = `
      <td class="td-month">${fmtMonth(row.month)}</td>
      <td class="td-close">$${row.close.toFixed(2)}</td>
      <td class="td-return ${dir}">${fmtRet(row.return)}</td>
      <td class="td-bar">
        ${row.return != null ? `<div class="bar-track">
          <div class="bar-mid"></div>
          <div class="bar-fill ${dir}" data-w="${barPct}"></div>
        </div>` : ''}
      </td>`;
    tbody.appendChild(tr);
  });

  requestAnimationFrame(() => {
    document.querySelectorAll('.bar-fill[data-w]').forEach(el => {
      el.style.width = el.dataset.w + '%';
    });
  });
}

render();
</script>
</body>
</html>
